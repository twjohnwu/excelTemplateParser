services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - ${DATA_DIR:-./data}/redis:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      REDIS_URL: redis://redis:6379/0
      DATA_DIR: /data
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-50}
      JOB_TIMEOUT_MIN: ${JOB_TIMEOUT_MIN:-10}
    volumes:
      - ./backend:/app
      - ${DATA_DIR:-./data}:/data
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: ./backend
    command: python -m app.workers.run
    environment:
      REDIS_URL: redis://redis:6379/0
      DATA_DIR: /data
      RQ_WORKERS: ${RQ_WORKERS:-4}
      JOB_TIMEOUT_MIN: ${JOB_TIMEOUT_MIN:-10}
    volumes:
      - ./backend:/app
      - ${DATA_DIR:-./data}:/data
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    # Mount the locally-built bundle so `npm run build` is picked up on the
    # next browser refresh — no image rebuild needed. The Dockerfile is kept
    # for future "ship a self-contained image" scenarios.
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped
